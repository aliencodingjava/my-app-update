name: Release APK

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode, must be higher than the installed app"
        required: true
        type: string
      version_name:
        description: "Android versionName, for example 0.2.252"
        required: true
        type: string
      update_title:
        description: "Top changelog card title"
        required: true
        default: "New App Update"
        type: string
      update_body:
        description: "Top changelog card body. Bullets can start with •"
        required: true
        type: string
      send_push:
        description: "Send Firebase push notification to app_updates topic"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      VERSION_CODE: ${{ inputs.version_code }}
      VERSION_NAME: ${{ inputs.version_name }}
      UPDATE_TITLE: ${{ inputs.update_title }}
      UPDATE_BODY: ${{ inputs.update_body }}
      UPDATE_GIST_ID: ${{ vars.UPDATE_GIST_ID || '8ef085a89b30d85e2e86fb6f148d80cb' }}
      UPDATE_GIST_FILENAME: ${{ vars.UPDATE_GIST_FILENAME || 'gistfile2.txt' }}
      FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      FCM_TOPIC: app_updates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Restore release keystore
        env:
          KEYSTORE_HEX: ${{ secrets.KEYSTORE_HEX }}
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p app/ci-signing
          python3 - <<'PY'
          import base64
          import binascii
          import os
          import pathlib
          import re

          hex_raw = os.environ.get("KEYSTORE_HEX", "")
          if hex_raw.strip():
              clean_hex = re.sub(r"[^0-9A-Fa-f]", "", hex_raw)
              decoded = binascii.unhexlify(clean_hex)
              print(f"Clean hex chars: {len(clean_hex)}")
          else:
              raw = os.environ["KEYSTORE_B64"]
              clean = re.sub(r"[^A-Za-z0-9+/=]", "", raw)
              clean += "=" * (-len(clean) % 4)
              decoded = base64.b64decode(clean, validate=False)
              print(f"Clean base64 chars: {len(clean)}")

          pathlib.Path("app/ci-signing/release-key.jks").write_bytes(decoded)
          print(f"Decoded keystore bytes: {len(decoded)}")
          PY
          {
            echo "storeFile=app/ci-signing/release-key.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties
          keytool -list \
            -keystore app/ci-signing/release-key.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS"

      - name: Apply release version
        run: python3 .github/scripts/set_android_version.py

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace

      - name: Prepare artifact
        id: artifact
        run: |
          APK_NAME="jac-air-tracker-${VERSION_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION_NAME}/${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: JAC Air Tracker ${{ inputs.version_name }}
          body: ${{ inputs.update_body }}
          files: ${{ steps.artifact.outputs.apk_name }}
          draft: false
          prerelease: false

      - name: Update app update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          APK_URL: ${{ steps.artifact.outputs.apk_url }}
        run: python3 .github/scripts/update_release_gist.py

      - name: Send Firebase update push
        if: ${{ inputs.send_push }}
        env:
          APK_URL: ${{ steps.artifact.outputs.apk_url }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -m pip install --disable-pip-version-check google-auth requests
          python3 .github/scripts/send_update_fcm.py
