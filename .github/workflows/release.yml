name: Release APK

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode, must be higher than the installed app"
        required: true
        type: string
      version_name:
        description: "Android versionName, for example 0.2.252"
        required: true
        type: string
      update_title:
        description: "Top changelog card title"
        required: true
        default: "New App Update"
        type: string
      update_body:
        description: "Top changelog card body. Bullets can start with •"
        required: true
        type: string
      send_push:
        description: "Send Firebase push notification to app_updates topic"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      VERSION_CODE: ${{ inputs.version_code }}
      VERSION_NAME: ${{ inputs.version_name }}
      UPDATE_TITLE: ${{ inputs.update_title }}
      UPDATE_BODY: ${{ inputs.update_body }}
      UPDATE_GIST_ID: ${{ vars.UPDATE_GIST_ID || '8ef085a89b30d85e2e86fb6f148d80cb' }}
      UPDATE_GIST_FILENAME: ${{ vars.UPDATE_GIST_FILENAME || 'gistfile2.txt' }}
      FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      FCM_TOPIC: app_updates

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Check release version is unused
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Use a higher versionCode/versionName."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Use a higher versionCode/versionName."
            exit 1
          fi

      - name: Restore release keystore
        env:
          KEYSTORE_HEX: ${{ secrets.KEYSTORE_HEX }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_FILE="$GITHUB_WORKSPACE/ci-signing/release-key.jks"
          mkdir -p "$(dirname "$KEYSTORE_FILE")"
          export KEYSTORE_FILE
          python3 - <<'PY'
          import binascii
          import os
          import pathlib
          import re

          hex_raw = os.environ.get("KEYSTORE_HEX", "")
          if not hex_raw.strip():
              raise SystemExit("KEYSTORE_HEX secret is required")
          clean_hex = re.sub(r"[^0-9A-Fa-f]", "", hex_raw)
          decoded = binascii.unhexlify(clean_hex)
          print(f"Clean hex chars: {len(clean_hex)}")

          pathlib.Path(os.environ["KEYSTORE_FILE"]).write_bytes(decoded)
          print(f"Decoded keystore bytes: {len(decoded)}")
          PY
          STORE_PASSWORD="$(printf '%s' "$KEYSTORE_PASSWORD" | tr -d '\r\n')"
          RELEASE_KEY_ALIAS="$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n')"
          RELEASE_KEY_PASSWORD="$(printf '%s' "$KEY_PASSWORD" | tr -d '\r\n')"
          {
            echo "storeFile=$KEYSTORE_FILE"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$RELEASE_KEY_ALIAS"
            echo "keyPassword=$RELEASE_KEY_PASSWORD"
          } > keystore.properties
          keytool -list \
            -keystore "$KEYSTORE_FILE" \
            -storepass "$STORE_PASSWORD" \
            -alias "$RELEASE_KEY_ALIAS"

      - name: Restore Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY repository secrets are required for release login/profile access."
            exit 1
          fi
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
          } > local.properties

      - name: Apply release version
        run: python3 .github/scripts/set_android_version.py

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace

      - name: Prepare artifact
        id: artifact
        run: |
          APK_NAME="jac-air-tracker-${VERSION_NAME}.apk"
          LATEST_APK_NAME="jac-air-tracker-latest.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          cp app/build/outputs/apk/release/app-release.apk "$LATEST_APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "latest_apk_name=$LATEST_APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_url=https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/${LATEST_APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION_NAME}" \
            "${{ steps.artifact.outputs.apk_name }}" \
            "${{ steps.artifact.outputs.latest_apk_name }}" \
            --target "$GITHUB_SHA" \
            --title "JAC Air Tracker ${VERSION_NAME}" \
            --notes "$UPDATE_BODY"

      - name: Update app update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          APK_URL: ${{ steps.artifact.outputs.apk_url }}
        run: python3 .github/scripts/update_release_gist.py

      - name: Send Firebase update push
        if: ${{ inputs.send_push }}
        env:
          APK_URL: ${{ steps.artifact.outputs.apk_url }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -m pip install --disable-pip-version-check google-auth requests
          python3 .github/scripts/send_update_fcm.py
