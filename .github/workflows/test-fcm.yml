name: Firebase Push Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      FCM_TOPIC: app_updates
      FCM_VALIDATE_ONLY: "true"
      VERSION_CODE: "0"
      VERSION_NAME: "test"
      APK_URL: "https://github.com/aliencodingjava/my-app-update"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Firebase credentials
        env:
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -m pip install --disable-pip-version-check google-auth requests
          python3 .github/scripts/send_update_fcm.py
